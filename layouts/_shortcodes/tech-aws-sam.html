{{- $appending := .Get "appendingText" | default "" -}}
{{- $class := .Get "class" | default "d-flex align-items-center gap-2 tech-item" -}}
<div class="{{ $class }}">
  <img src="{{ "svg/aws-svgs/aws-sam-svg.svg" | relURL }}" class="tech-icon-img" alt="AWS SAM SVG" />
  <span>AWS SAM{{ with $appending }}<span>{{ . }}</span>{{ end }}</span>
</div>
