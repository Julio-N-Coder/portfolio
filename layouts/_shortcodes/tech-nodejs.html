{{- $appending := .Get "appendingText" | default "" -}}
{{- $class := .Get "class" | default "d-flex align-items-center gap-2 tech-item" -}}
<div class="{{ $class }}">
  <img src="{{ "svg/nodejs-icon-svg.svg" | relURL }}" class="tech-icon-img" alt="Node.js SVG" />
  <span>Node.js{{ with $appending }}<span>{{ . }}</span>{{ end }}</span>
</div>
