{{- $appending := .Get "appendingText" | default "" -}}
{{- $class := .Get "class" | default "d-flex align-items-center gap-2 tech-item" -}}
<div class="{{ $class }}">
  <img src="{{ "svg/java-logo.svg" | relURL }}" class="tech-icon-img" alt="Java SVG" />
  <span>Java{{ with $appending }}<span>{{ . }}</span>{{ end }}</span>
</div>
